name: "PHP GraphQL Injection Detection"
description: "Detect GraphQL injection vulnerabilities in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "graphql"
  - type: "regex"
    pattern: "GraphQL"
  - type: "regex"
    pattern: "resolveField"
  - type: "regex"
    pattern: "query\\s*\\(\\s*\\$args"
  - type: "regex"
    pattern: "query\\s*\\(\\s*\\$input"
  - type: "regex"
    pattern: "mutation\\s*\\(\\s*\\$args"
  - type: "regex"
    pattern: "mutation\\s*\\(\\s*\\$input"
  - type: "regex"
    pattern: "\\$ctx->args"
  - type: "regex"
    pattern: "\\$info->fieldName"
  - type: "regex"
    pattern: "executeQuery"
  - type: "regex"
    pattern: "executeMutation"

fix_suggestion: "Validate and sanitize all GraphQL input. Use built-in query validation. Implement proper authorization at the resolver level. Rate limit expensive queries. Disable introspection in production if not needed."
