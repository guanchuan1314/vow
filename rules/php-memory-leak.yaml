name: "PHP Memory Leak Detection"
description: "Detect memory leak patterns in PHP applications"
severity: "medium"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "new\\s+PDO.*unset"
  - type: "regex"
    pattern: "new\\s+mysqli.*unset"
  - type: "regex"
    pattern: "\\$result\\s*->free\\(\\)"
  - type: "regex"
    pattern: "\\$result\\s*->close\\(\\)"
  - type: "regex"
    pattern: "mysqli_close\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "fclose\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "closedir\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "imagedestroy\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "curl_close\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "session_write_close\\s*\\(\\s*\\)"
  - type: "regex"
    pattern: "while.*->fetch"

fix_suggestion: "Always close database connections, file handles, and other resources. Use try-finally or proper cleanup. Use PDO with persistent connections carefully. Clear large arrays when no longer needed. Use memory_get_usage() to monitor memory."
