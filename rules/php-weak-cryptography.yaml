name: "PHP Weak Cryptography Detection"
description: "Detect weak cryptography usage in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "mcrypt_"
  - type: "regex"
    pattern: "MCRYPT_"
  - type: "regex"
    pattern: "DES\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "RC4"
  - type: "regex"
    pattern: "RC2"
  - type: "regex"
    pattern: "md5\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "sha1\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "crypt\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "base64_encode\\s*\\(\\s*\\$data"
  - type: "regex"
    pattern: "base64_decode\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "openssl_encrypt\\s*\\(\\s*\\$data\\s*,\\s*['\"]aes-128-cbc"
  - type: "regex"
    pattern: "openssl_encrypt\\s*\\(\\s*.*\\$method\\s*,\\s*['\"]aes-128-cbc"
  - type: "regex"
    pattern: "password_hash\\s*\\(\\s*\\$password\\s*,\\s*PASSWORD_DEFAULT"
  - type: "regex"
    pattern: "password_hash\\s*\\(\\s*\\$password\\s*,\\s*PASSWORD_BCRYPT"

fix_suggestion: "Use modern encryption algorithms (AES-256-GCM, ChaCha20-Poly1305). Use OpenSSL with proper modes. Use password_hash() with PASSWORD_ARGON2ID. Never use MD5, SHA1, or base64 for security purposes. Use authenticated encryption modes."
