name: "PHP CSRF Detection"
description: "Detect Cross-Site Request Forgery (CSRF) vulnerabilities in PHP applications"
severity: "medium"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "\\$_POST\\s*\\).*\\$"
  - type: "regex"
    pattern: "\\$_GET\\s*\\).*\\$"
  - type: "regex"
    pattern: "\\$_REQUEST\\s*\\).*\\$"
  - type: "regex"
    pattern: "if\\s*\\(\\s*isset\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "if\\s*\\(\\s*isset\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "session_start\\s*\\(\\s*\\)"
  - type: "regex"
    pattern: "\\$_SESSION"
  - type: "regex"
    pattern: "\\$this->input->post"
  - type: "regex"
    pattern: "\\$this->request->post"
  - type: "regex"
    pattern: "Form::open"
  - type: "regex"
    pattern: "Form::submit"
  - type: "regex"
    pattern: "<form.*method=['\"]POST"
  - type: "regex"
    pattern: "<form.*method=['\"]GET"

fix_suggestion: "Implement CSRF protection using tokens. Generate a unique token per session or per request, include it in forms as a hidden field, and verify it on the server. Use SameSite cookies. Check Origin/Referer headers for additional protection."
