name: "PHP Unrestricted File Upload Detection"
description: "Detect unrestricted file upload vulnerabilities in PHP applications"
severity: "critical"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "move_uploaded_file\\s*\\(\\s*\\$_FILES"
  - type: "regex"
    pattern: "move_uploaded_file\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "is_uploaded_file\\s*\\(\\s*\\$_FILES"
  - type: "regex"
    pattern: "copy\\s*\\(\\s*\\$_FILES"
  - type: "regex"
    pattern: "file_put_contents\\s*\\(\\s*\\$_FILES"
  - type: "regex"
    pattern: "rename\\s*\\(\\s*\\$_FILES"
  - type: "regex"
    pattern: "\\$_FILES\\s*\\[['\"]"
  - type: "regex"
    pattern: "\\$file\\s*=\\s*\\$_FILES"
  - type: "regex"
    pattern: "\\$filename\\s*=\\s*\\$_FILES"
  - type: "regex"
    pattern: "pathinfo\\s*\\(\\s*\\$_FILES"
  - type: "regex"
    pattern: "exif_imagetype\\s*\\(\\s*"
  - type: "regex"
    pattern: "getimagesize\\s*\\(\\s*"

fix_suggestion: "Validate file types using magic bytes (not just extensions). Use a whitelist of allowed extensions and MIME types. Rename uploaded files to random names. Store files outside web root. Limit file size. Set proper file permissions."
