name: "PHP Weak Authentication Detection"
description: "Detect weak authentication implementations in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "md5\\s*\\(\\s*\\$password"
  - type: "regex"
    pattern: "sha1\\s*\\(\\s*\\$password"
  - type: "regex"
    pattern: "crypt\\s*\\(\\s*\\$password"
  - type: "regex"
    pattern: "password_hash\\s*\\(\\s*\\$password\\s*,\\s*PASSWORD_DEFAULT"
  - type: "regex"
    pattern: "password_hash\\s*\\(\\s*\\$password\\s*,\\s*PASSWORD_BCRYPT"
  - type: "regex"
    pattern: "password_verify\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "if\\s*\\(\\s*\\$password\\s*=="
  - type: "regex"
    pattern: "if\\s*\\(\\s*\\$password\\s*==="
  - type: "regex"
    pattern: "\\$password\\s*=="
  - type: "regex"
    pattern: "\\$password\\s*==="
  - type: "regex"
    pattern: "strcmp\\s*\\(\\s*\\$password"
  - type: "regex"
    pattern: "empty\\s*\\(\\s*\\$_SESSION"
  - type: "regex"
    pattern: "isset\\s*\\(\\s*\\$_SESSION"

fix_suggestion: "Use password_hash() and password_verify() with PASSWORD_BCRYPT or PASSWORD_ARGON2ID. Never use md5, sha1, or crypt for passwords. Implement proper session management with secure, random session IDs. Use secure session cookies with HttpOnly, Secure, and SameSite flags."
