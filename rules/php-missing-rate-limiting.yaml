name: "PHP Missing Rate Limiting Detection"
description: "Detect missing rate limiting protections in PHP applications"
severity: "medium"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "session_start\\s*\\(\\s*\\)"
  - type: "regex"
    pattern: "login\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "authenticate\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "register\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "resetPassword\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "forgotPassword\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "sendEmail\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "sendMail\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "\\$app->post\\s*\\(['\"]/login"
  - type: "regex"
    pattern: "\\$app->post\\s*\\(['\"]/register"
  - type: "regex"
    pattern: "Route::post\\s*\\(['\"]/login"
  - type: "regex"
    pattern: "Route::post\\s*\\(['\"]/register"

fix_suggestion: "Implement rate limiting on sensitive endpoints like login, registration, password reset, and API endpoints. Use tools like Redis or Memcached to track request counts. Return proper 429 status code when limit is exceeded. Implement progressive delays."
