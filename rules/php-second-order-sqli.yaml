name: "PHP Second Order SQL Injection Detection"
description: "Detect second-order SQL injection vulnerabilities in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "INSERT INTO.*\\$_GET"
  - type: "regex"
    pattern: "INSERT INTO.*\\$_POST"
  - type: "regex"
    pattern: "UPDATE.*\\$_GET"
  - type: "regex"
    pattern: "UPDATE.*\\$_POST"
  - type: "regex"
    pattern: "INSERT INTO.*\\$_SESSION"
  - type: "regex"
    pattern: "UPDATE.*\\$_SESSION"
  - type: "regex"
    pattern: "session.*\\$_GET"
  - type: "regex"
    pattern: "session.*\\$_POST"
  - type: "regex"
    pattern: "\\$_SESSION\\[.*\\]\\s*=.*\\$_GET"
  - type: "regex"
    pattern: "\\$_SESSION\\[.*\\]\\s*=.*\\$_POST"
  - type: "regex"
    pattern: "cookie.*\\$_GET"
  - type: "regex"
    pattern: "cookie.*\\$_POST"

fix_suggestion: "Sanitize and validate all data before storing in the database, even if it came from trusted sources like session or cookie. Apply output encoding when displaying stored data. Use parameterized queries for all database operations including inserts and updates."
