name: "PHP Unvalidated Redirect Detection"
description: "Detect unvalidated redirect vulnerabilities in PHP applications"
severity: "medium"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "header\\s*\\(\\s*['\"]Location:"
  - type: "regex"
    pattern: "header\\s*\\(\\s*['\"]Location:\\s*\\$_GET"
  - type: "regex"
    pattern: "header\\s*\\(\\s*['\"]Location:\\s*\\$_POST"
  - type: "regex"
    pattern: "header\\s*\\(\\s*['\"]Location:\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "header\\s*\\(\\s*['\"]Location:\\s*\\$"
  - type: "regex"
    pattern: "redirect\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "redirect\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "redirect\\s*\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "redirect\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "forward\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "wp_redirect\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "wp_redirect\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "Response::redirect\\s*\\(\\s*\\$"

fix_suggestion: "Validate redirect URLs against an allowlist of permitted domains/paths. Never allow full URLs from user input. If dynamic redirects are needed, use a mapping of short names to URLs. Validate URLs start with / or are relative."
