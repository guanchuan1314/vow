name: "PHP Unsafe Reflection Detection"
description: "Detect unsafe reflection usage in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "ReflectionClass\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "ReflectionClass\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "ReflectionMethod\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "ReflectionMethod\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "ReflectionProperty\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "ReflectionProperty\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "->invoke\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "->getMethod\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "call_user_func\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "call_user_func\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "call_user_func_array\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "call_user_func_array\\s*\\(\\s*\\$_POST"

fix_suggestion: "Never use user input for reflection. Validate all class and method names. Use allowlists for permitted classes and methods. Disable dangerous reflection features in production."
