name: "PHP XXE Detection"
description: "Detect XML External Entity (XXE) vulnerabilities in PHP applications"
severity: "critical"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "simplexml_load_string\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "simplexml_load_string\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "simplexml_load_string\\s*\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "simplexml_load_file\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "simplexml_load_file\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "simplexml_load_file\\s*\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "DOMDocument\\s*->loadXML\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "DOMDocument\\s*->loadXML\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "XMLReader\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "XMLReader\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "LIBXML_NOENT"
  - type: "regex"
    pattern: "LIBXML_DTDLOAD"
  - type: "regex"
    pattern: "libxml_disable_entity_loader\\s*\\(\\s*false"

fix_suggestion: "Disable external entity loading using libxml_disable_entity_loader(true) before parsing. Use LIBXML_NOENT, LIBXML_DTDLOAD carefully. Validate XML input against a schema. Consider using JSON instead of XML when possible."
