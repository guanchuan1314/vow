name: "ts_express_injection"
description: "Detect injection vulnerabilities in TypeScript/Express — path traversal, SSRF, open redirect, XML, LDAP, CRLF, HTTP smuggling"
severity: "high"
patterns:
  # Path traversal
  - type: "contains"
    pattern: "path.join(__dirname, 'files', req.query."
  - type: "contains"
    pattern: "path.join(__dirname, 'uploads', req.body."
  - type: "contains"
    pattern: "fs.readFile(path.join(__dirname, req."
  - type: "contains"
    pattern: "fs.readFileSync(req.query."
  - type: "contains"
    pattern: "fs.readFileSync(req.body."
  - type: "contains"
    pattern: "fs.createReadStream(req."
  # SSRF
  - type: "contains"
    pattern: "axios.get(req.body.url"
  - type: "contains"
    pattern: "axios.get(req.query.url"
  - type: "contains"
    pattern: "axios.post(req.body.url"
  - type: "contains"
    pattern: "fetch(req.body.url"
  - type: "contains"
    pattern: "fetch(req.query.url"
  - type: "contains"
    pattern: "http.get(req.body.url"
  # Open redirect
  - type: "contains"
    pattern: "res.redirect(req.query.url"
  - type: "contains"
    pattern: "res.redirect(req.query.redirect"
  - type: "contains"
    pattern: "res.redirect(req.query.next"
  - type: "contains"
    pattern: "res.redirect(req.body.url"
  - type: "contains"
    pattern: "res.redirect(req.body.redirect"
  # XML injection
  - type: "contains"
    pattern: "parseString(req.body.xml"
  - type: "contains"
    pattern: "parseString(req.body)"
  - type: "contains"
    pattern: "xml2js.parseString(req."
  # LDAP injection
  - type: "contains"
    pattern: "`(uid=${req.body."
  - type: "contains"
    pattern: "`(cn=${req.body."
  - type: "contains"
    pattern: "`(uid=${req.query."
  - type: "contains"
    pattern: "search(req.body."
  # CRLF injection
  - type: "contains"
    pattern: "res.download(filePath, req.body."
  - type: "contains"
    pattern: "res.download(filePath, req.query."
  - type: "contains"
    pattern: "res.setHeader('Content-Disposition', req."
  - type: "contains"
    pattern: "res.set('Content-Disposition', req."
  # HTTP request smuggling
  - type: "contains"
    pattern: "req.headers['transfer-encoding']"
  - type: "contains"
    pattern: "req.headers['content-length']"
  - type: "contains"
    pattern: "res.setHeader('Transfer-Encoding', req."
file_types: ["ts", "js", "tsx", "jsx"]
