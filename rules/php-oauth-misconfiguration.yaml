name: "PHP OAuth Misconfiguration Detection"
description: "Detect OAuth misconfiguration vulnerabilities in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "oauth"
  - type: "regex"
    pattern: "OAuth"
  - type: "regex"
    pattern: "ClientID"
  - type: "regex"
    pattern: "client_secret"
  - type: "regex"
    pattern: "access_token"
  - type: "regex"
    pattern: "refresh_token"
  - type: "regex"
    pattern: "redirect_uri"
  - type: "regex"
    pattern: "state\\s*="
  - type: "regex"
    pattern: "client_id"
  - type: "regex"
    pattern: "authorization_endpoint"
  - type: "regex"
    pattern: "token_endpoint"

fix_suggestion: "Validate redirect_uri against an allowlist. Implement and verify state parameter to prevent CSRF. Use PKCE (Proof Key for Code Exchange) for authorization code flow. Validate all OAuth responses. Use secure storage for tokens. Implement token rotation."
