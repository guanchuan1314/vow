name: "PHP Blind SQL Injection Detection"
description: "Detect blind SQL injection vulnerabilities in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "if\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "if\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "if\\s*\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "sleep\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "sleep\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "benchmark\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "benchmark\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "WHERE.*\\$_GET.*="
  - type: "regex"
    pattern: "WHERE.*\\$_POST.*="
  - type: "regex"
    pattern: "SELECT.*WHERE.*\\$_GET"
  - type: "regex"
    pattern: "SELECT.*WHERE.*\\$_POST"

fix_suggestion: "Use parameterized queries (prepared statements) for all database operations. Never concatenate user input into SQL. Implement proper error handling that doesn't leak database information. Use Web Application Firewall (WAF) for additional protection."
