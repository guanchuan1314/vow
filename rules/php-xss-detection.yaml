name: "PHP XSS Detection"
description: "Detect Cross-Site Scripting (XSS) vulnerabilities in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "echo\\s+\\$_POST"
  - type: "regex"
    pattern: "echo\\s+\\$_GET"
  - type: "regex"
    pattern: "echo\\s+\\$_REQUEST"
  - type: "regex"
    pattern: "echo\\s+\\$_SERVER\\['"
  - type: "regex"
    pattern: "print\\s+\\$_POST"
  - type: "regex"
    pattern: "print\\s+\\$_GET"
  - type: "regex"
    pattern: "print\\s+\\$_REQUEST"
  - type: "regex"
    pattern: "print_r\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "print_r\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "var_dump\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "var_dump\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "\\?>.*\\$_GET.*<?php"
  - type: "regex"
    pattern: "\\?>.*\\$_POST.*<?php"
  - type: "regex"
    pattern: "\\?>.*\\$_REQUEST.*<?php"
  - type: "regex"
    pattern: "htmlentities\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "htmlspecialchars\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "->innerHTML\\s*="
  - type: "regex"
    pattern: "->write\\s*\\(\\s*\\$"

fix_suggestion: "Always escape output using htmlspecialchars() or htmlentities() with ENT_QUOTES and UTF-8 encoding. Use Content-Security-Policy headers. Consider using template engines like Twig or Blade that auto-escape by default."
