name: "PHP Mass Assignment Detection"
description: "Detect mass assignment vulnerabilities in PHP applications"
severity: "medium"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "->create\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "->create\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "->create\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "->fill\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "->fill\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "->update\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "->update\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "Model::create\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "Model::create\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "new\\s+\\w+\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "new\\s+\\w+\\s*\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "\\$model\\s*=\\s*new\\s+\\w+.*\\$_POST"
  - type: "regex"
    pattern: "array_merge\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "array_merge\\s*\\(\\s*\\$_REQUEST"

fix_suggestion: "Use mass assignment protection by defining $fillable or $ guarded properties in models. Only allow explicitly whitelisted fields to be mass-assigned. Use $hidden to protect sensitive fields from serialization."
