name: "PHP SQL Injection Detection"
description: "Detect SQL injection vulnerabilities in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "mysql?_query\\s*\\(\\s*[\"'].*\\$\\{?_POST"
  - type: "regex"
    pattern: "mysql?_query\\s*\\(\\s*[\"'].*\\$\\{?_GET"
  - type: "regex"
    pattern: "mysql?_query\\s*\\(\\s*[\"'].*\\$\\{?_REQUEST"
  - type: "regex"
    pattern: "pg_query\\s*\\(\\s*[\"'].*\\$\\{?_POST"
  - type: "regex"
    pattern: "pg_query\\s*\\(\\s*[\"'].*\\$\\{?_GET"
  - type: "regex"
    pattern: "SELECT.*FROM.*WHERE.*\\$_POST"
  - type: "regex"
    pattern: "SELECT.*FROM.*WHERE.*\\$_GET"
  - type: "regex"
    pattern: "INSERT INTO.*VALUES.*\\$_POST"
  - type: "regex"
    pattern: "UPDATE.*SET.*WHERE.*\\$_POST"
  - type: "regex"
    pattern: "DELETE FROM.*WHERE.*\\$_GET"
  - type: "regex"
    pattern: "\\$sql\\s*=\\s*[\"'].*\\$\\{?[a-zA-Z_]"
  - type: "regex"
    pattern: "->query\\s*\\(\\s*[\"'].*\\$\\{?"
  - type: "regex"
    pattern: "->execute\\s*\\(\\s*[\"'].*\\$\\{?"
  - type: "regex"
    pattern: "\\$pdo->prepare\\s*\\([\"'].*\\$\\{?"
  - type: "regex"
    pattern: "sprintf\\s*\\(\\s*[\"'].*SELECT"
  - type: "regex"
    pattern: "vsprintf\\s*\\(\\s*[\"'].*SELECT"
  - type: "regex"
    pattern: "\\$\\{?\\w+\\}?\\s*\\.\\s*[\"'].*SELECT"
  - type: "regex"
    pattern: "concat\\s*\\([^)]*\\$\\{?[a-zA-Z_]"

fix_suggestion: "Use parameterized queries (prepared statements) with PDO or mysqli. Never concatenate user input directly into SQL queries. Use query builders like Laravel's Eloquent or Doctrine ORM."
