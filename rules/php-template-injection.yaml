name: "PHP Template Injection Detection"
description: "Detect Server-Side Template Injection (SSTI) vulnerabilities in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "echo\\s+\\$this->view->render"
  - type: "regex"
    pattern: "echo\\s+\\$twig->render"
  - type: "regex"
    pattern: "\\$twig->render\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "\\$twig->render\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "\\$smarty->fetch\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "\\$smarty->fetch\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "\\$blade->make\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "View::make\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "render\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "render\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "include\\s+['\"]views/"
  - type: "regex"
    pattern: "require\\s+['\"]views/"
  - type: "regex"
    pattern: "extract\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "extract\\s*\\(\\s*\\$_POST"

fix_suggestion: "Never pass user input directly to template render functions. Use template engines that sandbox template execution. If user input must be included, use a whitelist approach. Avoid using extract() on user-supplied data."
