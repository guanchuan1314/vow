name: "ts_express_resource"
description: "Detect resource and stability vulnerabilities in TypeScript/Express — buffer overflow, race conditions, prototype pollution, memory leaks, deadlocks, recursion, rate limiting, CSP, file uploads"
severity: "high"
patterns:
  # Buffer overflow
  - type: "contains"
    pattern: "Buffer.alloc(1024)"
  - type: "contains"
    pattern: "Buffer.alloc(256)"
  - type: "contains"
    pattern: "Buffer.allocUnsafe("
  # Prototype pollution
  - type: "contains"
    pattern: "Object.assign(User.prototype, req.body"
  - type: "contains"
    pattern: "Object.assign(Object.prototype, req."
  - type: "contains"
    pattern: "[req.body.key]"
  - type: "contains"
    pattern: "__proto__"
  - type: "contains"
    pattern: "constructor.prototype"
  # Type juggling
  - type: "contains"
    pattern: "password == "
  - type: "contains"
    pattern: "== user.id.toString()"
  - type: "contains"
    pattern: ".toString() =="
  # Missing rate limiting
  - type: "contains"
    pattern: "app.post('/login'"
  - type: "contains"
    pattern: "app.post('/auth'"
  - type: "contains"
    pattern: "app.post('/signin'"
  - type: "contains"
    pattern: "app.post('/api/login'"
  # Missing CSP
  - type: "contains"
    pattern: "res.send(`<!DOCTYPE"
  - type: "contains"
    pattern: "res.send(`<html"
  # Unrestricted file upload
  - type: "contains"
    pattern: "multer({ dest:"
  - type: "contains"
    pattern: "multer({ storage:"
  - type: "contains"
    pattern: "upload.any()"
  # Memory leak
  - type: "contains"
    pattern: ".push(req."
  - type: "contains"
    pattern: "requests.push("
  - type: "contains"
    pattern: "logs.push("
  - type: "contains"
    pattern: "cache.push("
  # Race condition
  - type: "contains"
    pattern: "setTimeout"
  # Uncontrolled recursion (basic pattern)
  - type: "regex"
    pattern: "function\\s+(\\w+)\\s*\\([^)]*\\)\\s*\\{[^}]*\\1\\s*\\("
file_types: ["ts", "js", "tsx", "jsx"]
