name: "PHP JWT Weakness Detection"
description: "Detect JWT (JSON Web Token) weaknesses in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "JWT::decode\\s*\\(\\s*"
  - type: "regex"
    pattern: "jwt_decode\\s*\\(\\s*"
  - type: "regex"
    pattern: "firebase\\.php-jwt"
  - type: "regex"
    pattern: "'none'\\s*:\\s*true"
  - type: "regex"
    pattern: "'none'\\s*:\\s*TRUE"
  - type: "regex"
    pattern: "algorithm\\s*=>\\s*['\"]HS256"
  - type: "regex"
    pattern: "algorithm\\s*=>\\s*['\"]HS512"
  - type: "regex"
    pattern: "alg\\s*=>\\s*['\"]RS256"
  - type: "regex"
    pattern: "setAlgorithm\\s*\\(\\s*['\"]HS"
  - type: "regex"
    pattern: "setKey\\s*\\(\\s*['\"]"
  - type: "regex"
    pattern: "public\\s+function\\s+decode"
  - type: "regex"
    pattern: "\\$payload\\s*=\\s*JWT::decode"

fix_suggestion: "Use strong asymmetric algorithms (RS256, ES256). Never use 'none' algorithm. Always verify signatures using proper key validation. Use libraries that prevent algorithm confusion attacks. Store secrets securely. Implement proper token expiration and validation."
