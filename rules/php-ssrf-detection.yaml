name: "PHP SSRF Detection"
description: "Detect Server-Side Request Forgery (SSRF) vulnerabilities in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "file_get_contents\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "file_get_contents\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "file_get_contents\\s*\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "curl_setopt\\s*\\(\\s*\\$ch\\s*,\\s*CURLOPT_URL\\s*,\\s*\\$_GET"
  - type: "regex"
    pattern: "curl_setopt\\s*\\(\\s*\\$ch\\s*,\\s*CURLOPT_URL\\s*,\\s*\\$_POST"
  - type: "regex"
    pattern: "curl_setopt\\s*\\(\\s*\\$ch\\s*,\\s*CURLOPT_URL\\s*,\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "curl_exec\\s*\\(\\s*\\$ch\\s*\\).*\\$_GET"
  - type: "regex"
    pattern: "curl_exec\\s*\\(\\s*\\$ch\\s*\\).*\\$_POST"
  - type: "regex"
    pattern: "simplexml_load_file\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "simplexml_load_file\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "simplexml_load_string\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "preg_replace\\s*\\(\\s*['\"]/e['\"]"
  - type: "regex"
    pattern: "GuzzleHttp.*\\$url\\s*=\\s*\\$_GET"
  - type: "regex"
    pattern: "GuzzleHttp.*\\$url\\s*=\\s*\\$_POST"
  - type: "regex"
    pattern: "fopen\\s*\\(\\s*['\"]http"
  - type: "regex"
    pattern: "fopen\\s*\\(\\s*['\"]ftp"

fix_suggestion: "Validate and whitelist allowed URLs, domains, and protocols. Use DNS resolution to verify the resolved IP is within your expected network. Implement URL scheme restrictions (block file://, gopher://, ftp://). Use allow_url_include=0 in php.ini."
