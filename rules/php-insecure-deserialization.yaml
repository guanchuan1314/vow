name: "PHP Insecure Deserialization Detection"
description: "Detect insecure deserialization vulnerabilities in PHP applications"
severity: "critical"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "unserialize\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "unserialize\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "unserialize\\s*\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "unserialize\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "unserialize\\s*\\(\\s*file_get_contents"
  - type: "regex"
    pattern: "unserialize\\s*\\(\\s*file_put_contents"
  - type: "regex"
    pattern: "yaml_parse\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "yaml_parse\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "xml_parse\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "xml_parse\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "simplexml_load_string\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "simplexml_load_string\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "json_decode\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "json_decode\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "var_export\\s*\\(\\s*\\$"

fix_suggestion: "Never unserialize data from untrusted sources. Use JSON for data exchange instead of PHP serialization. If you must use unserialize, use the allowed_classes parameter to whitelist allowed classes. Consider using message signing (HMAC) for serialized data."
