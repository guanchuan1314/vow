name: "PHP Path Traversal Detection"
description: "Detect path traversal vulnerabilities in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "file_get_contents\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "file_get_contents\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "file_get_contents\\s*\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "readfile\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "readfile\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "fopen\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "fopen\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "include\\s+\\$_GET"
  - type: "regex"
    pattern: "include\\s+\\$_POST"
  - type: "regex"
    pattern: "include\\s+\\$_REQUEST"
  - type: "regex"
    pattern: "require\\s+\\$_GET"
  - type: "regex"
    pattern: "require\\s+\\$_POST"
  - type: "regex"
    pattern: "require_once\\s+\\$_GET"
  - type: "regex"
    pattern: "include_once\\s+\\$_GET"
  - type: "regex"
    pattern: "file\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "file\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "readfile\\s*\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "highlight_file\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "show_source\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "passthru\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "passthru\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "exec\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "exec\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "system\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "system\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "shell_exec\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "shell_exec\\s*\\(\\s*\\$_POST"

fix_suggestion: "Validate and sanitize file paths using basename() to extract only the filename. Implement whitelist of allowed files/directories. Use realpath() to resolve and validate the final path. Never concatenate user input directly into file paths."
