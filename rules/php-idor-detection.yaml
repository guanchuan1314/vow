name: "PHP IDOR Detection"
description: "Detect Insecure Direct Object Reference (IDOR) vulnerabilities in PHP applications"
severity: "medium"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "\\$_GET\\s*\\[['\"]id['\"]\\]"
  - type: "regex"
    pattern: "\\$_POST\\s*\\[['\"]id['\"]\\]"
  - type: "regex"
    pattern: "\\$_REQUEST\\s*\\[['\"]id['\"]\\]"
  - type: "regex"
    pattern: "\\$_GET\\s*\\[['\"]user"
  - type: "regex"
    pattern: "\\$_POST\\s*\\[['\"]user"
  - type: "regex"
    pattern: "\\$id\\s*=\\s*\\$_GET"
  - type: "regex"
    pattern: "\\$id\\s*=\\s*\\$_POST"
  - type: "regex"
    pattern: "->find\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "->find\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "->findById\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "->findById\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "WHERE\\s+id\\s*=\\s*\\$_GET"
  - type: "regex"
    pattern: "WHERE\\s+id\\s*=\\s*\\$_POST"
  - type: "regex"
    pattern: "->delete\\(\\s*\\$id"
  - type: "regex"
    pattern: "->update\\(\\s*\\$id"

fix_suggestion: "Implement proper authorization checks. Verify that the current user has permission to access the requested resource. Use indirect references (mapping internal IDs to random tokens). Implement object-level access control checks."
