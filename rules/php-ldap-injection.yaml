name: "PHP LDAP Injection Detection"
description: "Detect LDAP injection vulnerabilities in PHP applications"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "ldap_search\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "ldap_list\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "ldap_read\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "ldap_bind\\s*\\(\\s*\\$"
  - type: "regex"
    pattern: "ldap_search\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "ldap_search\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "ldap_search\\s*\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "ldap_list\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "ldap_list\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "ldap_bind\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "ldap_bind\\s*\\(\\s*\\$_POST"

fix_suggestion: "Sanitize and validate all user input used in LDAP queries. Escape special characters according to RFC 2254. Use parameterized LDAP queries if available. Implement proper input validation and allowlisting."
