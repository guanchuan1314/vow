name: "JavaScript CSRF Detection"
description: "Detect Cross-Site Request Forgery (CSRF) vulnerabilities in JavaScript/Express applications"
severity: "medium"
file_types: ["js", "ts", "jsx", "tsx"]

patterns:
  - type: "regex"
    pattern: "app\\.post\\s*\\([^,]*,\\s*\\([^)]*req\\s*,\\s*res[^)]*\\)\\s*=>\\s*\\{[^}]*\\}\\)"
  - type: "regex"
    pattern: "router\\.post\\s*\\([^,]*,\\s*\\([^)]*req\\s*,\\s*res[^)]*\\)\\s*=>\\s*\\{[^}]*\\}\\)"
  - type: "regex"
    pattern: "app\\.put\\s*\\([^,]*,\\s*\\([^)]*req\\s*,\\s*res[^)]*\\)\\s*=>\\s*\\{[^}]*\\}\\)"
  - type: "regex"
    pattern: "app\\.delete\\s*\\([^,]*,\\s*\\([^)]*req\\s*,\\s*res[^)]*\\)\\s*=>\\s*\\{[^}]*\\}\\)"
  - type: "regex"
    pattern: "express\\.Router\\(\\)\\.(post|put|delete|patch)\\s*\\([^,]*,\\s*\\([^)]*req\\s*,\\s*res[^)]*\\)"

fix_suggestion: "Implement CSRF protection using middleware like 'csurf' or 'helmet'. Validate CSRF tokens for state-changing operations. Use SameSite cookies and verify Origin/Referer headers for additional protection."