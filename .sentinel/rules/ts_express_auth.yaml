name: "ts_express_auth"
description: "Detect authentication and access control vulnerabilities in TypeScript/Express — mass assignment, IDOR, weak auth, template injection"
severity: "high"
patterns:
  # Mass assignment
  - type: "contains"
    pattern: "...req.body"
  - type: "contains"
    pattern: "Object.assign(user, req.body"
  - type: "contains"
    pattern: "Object.assign({}, req.body"
  - type: "contains"
    pattern: ".create(req.body)"
  - type: "contains"
    pattern: "= req.body as "
  # IDOR
  - type: "contains"
    pattern: ".findById(req.params.id"
  - type: "contains"
    pattern: ".findByPk(req.params.id"
  - type: "contains"
    pattern: "findOne({ _id: req.params.id"
  # Weak authentication
  - type: "contains"
    pattern: "password === req.body."
  - type: "contains"
    pattern: "req.body.password === '"
  - type: "contains"
    pattern: "password == req.body."
  - type: "contains"
    pattern: 'password === "admin"'
  - type: "contains"
    pattern: "password === 'admin'"
  - type: "contains"
    pattern: "password === 'password'"
  # Template injection / SSTI
  - type: "contains"
    pattern: "res.render(req.body."
  - type: "contains"
    pattern: "res.render(req.query."
  - type: "contains"
    pattern: "res.render(req.params."
  # Insecure deserialization
  - type: "contains"
    pattern: "JSON.parse(req.body"
  - type: "contains"
    pattern: "JSON.parse(req.query"
  - type: "contains"
    pattern: "JSON.parse(req.headers"
file_types: ["ts", "js", "tsx", "jsx"]
