name: "PHP NoSQL Injection Detection"
description: "Detect NoSQL injection vulnerabilities in PHP applications using MongoDB"
severity: "high"
file_types: ["php"]

patterns:
  - type: "regex"
    pattern: "->findOne\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "->findOne\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "->findOne\\s*\\(\\s*\\$_REQUEST"
  - type: "regex"
    pattern: "->find\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "->find\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "->insertOne\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "->insertOne\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "->updateOne\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "->updateOne\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "->deleteOne\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "->deleteOne\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "->where\\s*\\(\\s*\\$_GET"
  - type: "regex"
    pattern: "->where\\s*\\(\\s*\\$_POST"
  - type: "regex"
    pattern: "MongoDB\\\\Driver\\\\Query"

fix_suggestion: "Validate and sanitize user input before using in NoSQL queries. Use type checking on input fields. Use parameterized queries or query builders. Validate expected types for all input parameters."
